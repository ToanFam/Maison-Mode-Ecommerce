server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "DENY" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
  add_header Content-Security-Policy "default-src 'self'; img-src 'self' https://images.unsplash.com data:; connect-src 'self' http://localhost:8080 https:; script-src 'self'; style-src 'self' 'unsafe-inline'; font-src 'self' data:;" always;

  gzip on;
  gzip_types text/plain text/css application/json application/javascript image/svg+xml;

  location ~* \.(js|css|svg|png|jpg|jpeg|webp|ico)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  location / {
    try_files $uri /index.html;
  }
}
