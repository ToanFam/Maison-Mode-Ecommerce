services:
  - type: web
    name: maison-mode-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    healthCheckPath: /actuator/health/readiness
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: maison-mode-db
          property: connectionString
      - key: SPRING_JPA_HIBERNATE_DDL_AUTO
        value: update
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRATION_MS
        value: "86400000"
      - key: CORS_ALLOWED_ORIGINS
        value: https://maison-mode-web.onrender.com
      - key: RATE_LIMIT_ENABLED
        value: "true"
      - key: RATE_LIMIT_CAPACITY
        value: "120"
      - key: RATE_LIMIT_WINDOW_SECONDS
        value: "60"

  - type: web
    name: maison-mode-web
    runtime: docker
    dockerfilePath: ./frontend/Dockerfile
    dockerContext: ./frontend
    envVars:
      - key: VITE_API_URL
        value: https://maison-mode-api.onrender.com/api

databases:
  - name: maison-mode-db
    databaseName: fashion_commerce
    user: fashion_user
